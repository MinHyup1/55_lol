<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL 커스텀 매칭 - 무제한 리롤 버전</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1c23; color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 1000px; background: #2c2f3a; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #f1c40f; margin-bottom: 20px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        .section { background: #3a3f4b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #4a4f5d; }
        h2 { font-size: 1.1em; color: #3498db; border-left: 4px solid #3498db; padding-left: 10px; margin-bottom: 15px; }

        /* 메모장 스타일 */
        .memo-section { background: #fffbe6; color: #333; border: 2px solid #f1c40f; }
        #betMemo { width: 100%; height: 60px; padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: transparent; color: #333; font-size: 1.1em; font-weight: bold; resize: vertical; box-sizing: border-box; }

        /* 돌림판 영역 */
        .roulette-wrapper { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
        .roulette-container { display: flex; flex-direction: column; align-items: center; position: relative; width: 200px; }
        .wheel-box { position: relative; width: 170px; height: 170px; border-radius: 50%; border: 4px solid #fff; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1); overflow: hidden; }
        .pointer { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #f1c40f; z-index: 10; }
        
        #pickWheel { background: conic-gradient(#3498db 0% 25%, #e74c3c 25% 50%, #3498db 50% 75%, #e74c3c 75% 100%); }
        #sideWheel { background: conic-gradient(#2c3e50 0% 25%, #f39c12 25% 50%, #2c3e50 50% 75%, #f39c12 75% 100%); }

        .wheel-label { position: absolute; width: 100%; height: 100%; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; text-shadow: 1px 1px 2px #000; }
        .l-1 { transform: rotate(45deg) translateY(-50px); }
        .l-2 { transform: rotate(135deg) translateY(-50px); }
        .l-3 { transform: rotate(225deg) translateY(-50px); }
        .l-4 { transform: rotate(315deg) translateY(-50px); }

        .result-box { height: 35px; font-size: 1.1em; font-weight: bold; margin-top: 10px; color: #f1c40f; text-align: center; }
        .btn-action { background-color: #9b59b6; color: white; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; width: 100%; }

        /* 명단 입력 */
        textarea.name-input { width: 100%; height: 50px; padding: 10px; border-radius: 8px; background: #222; color: #fff; border: 1px solid #555; resize: none; box-sizing: border-box; }
        
        /* 라인 배정 결과 및 카운터 */
        .team-display { display: flex; gap: 20px; margin-top: 10px; }
        .team-card { flex: 1; background: #222; border-radius: 12px; padding: 15px; border-top: 5px solid #555; position: relative; }
        .reroll-counter { position: absolute; top: 10px; right: 15px; background: #e74c3c; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; font-weight: bold; }
        .line-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #333; }
        .line-row .pos-label { color: #aaa; }
        .line-row .lock-toggle { margin-left: auto; background: transparent; border: none; font-size: 0.95em; cursor: pointer; padding: 0; border-radius: 4px; line-height: 1; width: 22px; text-align: center; visibility: hidden; transition: background 0.15s, transform 0.15s; }
        .line-row .lock-toggle:hover { background: rgba(255,255,255,0.1); transform: scale(1.25); }
        .line-row .player-name { margin-left: 6px; font-weight: bold; cursor: pointer; user-select: none; transition: color 0.15s; }
        .line-row .player-name:hover { color: #f1c40f; }
        .line-row.locked { background: rgba(241, 196, 15, 0.12); border-radius: 4px; padding: 6px 6px; }
        .line-row.locked .lock-toggle { visibility: visible; }
        .line-row.locked .player-name { color: #f1c40f; }

        .lock-hint { color: #95a5a6; font-size: 0.85em; margin-bottom: 12px; padding-left: 2px; }

        .copy-btn { background: transparent; border: none; font-size: 0.85em; cursor: pointer; padding: 0 4px; margin-left: 4px; border-radius: 3px; opacity: 0.55; transition: opacity 0.15s, transform 0.15s; vertical-align: middle; }
        .copy-btn:hover { opacity: 1; transform: scale(1.2); }

        .btn-main { background-color: #f1c40f; color: #000; width: 100%; font-size: 1.2em; font-weight: bold; padding: 12px; border-radius: 8px; border: none; cursor: pointer; margin: 15px 0; }
        .btn-confirm { background-color: #27ae60; color: white; width: 100%; font-size: 1.1em; font-weight: bold; padding: 12px; border-radius: 8px; border: none; cursor: pointer; margin-top: 12px; transition: background 0.15s; }
        .btn-confirm:hover { background-color: #2ecc71; }
        .btn-reroll { background-color: #e67e22; color: white; width: 100%; margin-top: 10px; padding: 8px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-reroll:disabled { background-color: #555; cursor: not-allowed; opacity: 0.6; }
        .btn-reroll-both { background-color: #9b59b6; color: white; width: 100%; margin-top: 15px; padding: 13px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: background 0.15s; }
        .btn-reroll-both:hover:not(:disabled) { background-color: #8e44ad; }
        .btn-reroll-both:disabled { background-color: #555; cursor: not-allowed; opacity: 0.6; }

        /* 애니메이션 토글 체크박스 */
        .anim-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; color: #ccc; font-size: 0.95em; cursor: pointer; user-select: none; }
        .anim-toggle input { cursor: pointer; width: 16px; height: 16px; accent-color: #f1c40f; }

        /* 최종 확정 깜빡임 효과 */
        @keyframes flashRow {
            0%   { background: rgba(241, 196, 15, 0.95); transform: scale(1.08); box-shadow: 0 0 12px rgba(241, 196, 15, 0.8); }
            40%  { background: rgba(241, 196, 15, 0.7); transform: scale(1.04); }
            100% { background: transparent; transform: scale(1); box-shadow: none; }
        }
        .line-row.flash { animation: flashRow 0.6s ease-out; }
        .line-row.locked.flash { animation: none; }  /* 고정된 라인은 깜빡임 X */
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 LoL 매칭 마스터 툴</h1>

    <div class="section memo-section">
        <h2>📝 오늘의 내기 메모</h2>
        <textarea id="betMemo" placeholder="내기 내용을 적어주세요."></textarea>
    </div>

    <div class="section">
        <h2>1. 선픽 및 진영 결정</h2>
        <div class="roulette-wrapper">
            <div class="roulette-container">
                <div class="pointer"></div>
                <div id="pickWheel" class="wheel-box">
                    <div class="wheel-label l-1">1팀</div><div class="wheel-label l-2">2팀</div>
                    <div class="wheel-label l-3">1팀</div><div class="wheel-label l-4">2팀</div>
                </div>
                <div id="pickResult" class="result-box">준비</div>
                <button id="pickBtn" class="btn-action" onclick="spin('pick')">선픽 돌리기</button>
            </div>
            <div class="roulette-container">
                <div class="pointer"></div>
                <div id="sideWheel" class="wheel-box">
                    <div class="wheel-label l-1">BLUE</div><div class="wheel-label l-2">RED</div>
                    <div class="wheel-label l-3">BLUE</div><div class="wheel-label l-4">RED</div>
                </div>
                <div id="sideResult" class="result-box">준비</div>
                <button id="sideBtn" class="btn-action" onclick="spin('side')" style="background-color: #34495e;">진영 돌리기</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>2. 최종 명단 입력</h2>
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;"><textarea id="t1Input" class="name-input" placeholder="이름을 스페이스로 구분해 5명 입력">연준 창스 봉수 재원 형석</textarea></div>
            <div style="flex: 1;"><textarea id="t2Input" class="name-input" placeholder="이름을 스페이스로 구분해 5명 입력">주원 관수 민협 익환 주영</textarea></div>
        </div>
        <button class="btn-confirm" onclick="confirmRoster()">✅ 명단 완료</button>
    </div>

    <div class="section">
        <h2>3. 포지션 무제한 리롤</h2>
        <label class="anim-toggle">
            <input type="checkbox" id="animToggle" checked>
            🎰 슬롯머신 애니메이션 (해제하면 회전 없이 확정 깜빡임만 표시)
        </label>
        <div class="lock-hint">💡 이름을 더블클릭하면 해당 라인이 고정됩니다. (🔒 클릭으로 해제)</div>
        <div class="team-display">
            <div class="team-card" style="border-color: #3498db;">
                <span class="reroll-counter" id="t1Count">Reroll: 0</span>
                <div style="text-align:center; font-weight:bold; margin-bottom:10px; color:#3498db;">TEAM 1<button id="copy1" class="copy-btn" onclick="copyLineup(1)" title="라인 순서대로 이름 복사">📋</button></div>
                <div id="t1Result"></div>
                <button id="t1Reroll" class="btn-reroll" onclick="rerollTeam(1)" disabled>1팀 리롤</button>
            </div>
            <div class="team-card" style="border-color: #e74c3c;">
                <span class="reroll-counter" id="t2Count">Reroll: 0</span>
                <div style="text-align:center; font-weight:bold; margin-bottom:10px; color:#e74c3c;">TEAM 2<button id="copy2" class="copy-btn" onclick="copyLineup(2)" title="라인 순서대로 이름 복사">📋</button></div>
                <div id="t2Result"></div>
                <button id="t2Reroll" class="btn-reroll" onclick="rerollTeam(2)" disabled>2팀 리롤</button>
            </div>
        </div>
        <button id="rerollBothBtn" class="btn-reroll-both" onclick="rerollBoth()" disabled>🎰 같이 돌리기 (1팀 + 2팀 동시 리롤)</button>
    </div>
</div>

<script>
    let rotations = { pick: 0, side: 0 };
    let rerollCounts = { 1: 0, 2: 0 };
    let currentLineup = { 1: [], 2: [] };
    let locked = { 1: [false,false,false,false,false], 2: [false,false,false,false,false] };
    const pos = ["TOP", "JUNGLE", "MID", "ADC", "SUP"];

    // Fisher-Yates (Durstenfeld) shuffle — 모든 순열이 1/n! 균등 확률
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function spin(type) {
        const wheel = document.getElementById(type + 'Wheel');
        const res = document.getElementById(type + 'Result');
        const btn = document.getElementById(type + 'Btn');
        btn.disabled = true;
        const add = 1800 + Math.floor(Math.random() * 360);
        rotations[type] += add;
        wheel.style.transform = `rotate(${rotations[type]}deg)`;
        setTimeout(() => {
            const angle = rotations[type] % 360;
            const zone = Math.floor(((360 - angle) % 360) / 90);
            if (type === 'pick') {
                res.innerText = (zone === 0 || zone === 2) ? "🎉 1팀 선픽!" : "🎉 2팀 선픽!";
            } else {
                const isB1 = (zone === 0 || zone === 2);
                res.innerHTML = isB1 ? "<span style='color:#3498db'>1B / 2R</span>" : "<span style='color:#e74c3c'>1R / 2B</span>";
            }
            btn.disabled = false;
        }, 3000);
    }

    // 팀 n을 화면에 렌더. animateIndices에 포함된 인덱스만 깜빡임.
    function renderTeam(n, animateIndices) {
        const result = document.getElementById(`t${n}Result`);
        let h = "";
        for (let i = 0; i < 5; i++) {
            const name = currentLineup[n][i] != null ? currentLineup[n][i] : "—";
            const isLocked = locked[n][i];
            const animate = animateIndices && animateIndices.includes(i) && !isLocked;
            const classes = ["line-row"];
            if (isLocked) classes.push("locked");
            if (animate) classes.push("flash");
            const delay = animate ? ` style="animation-delay:${animateIndices.indexOf(i)*70}ms"` : "";
            h += `<div class="${classes.join(' ')}"${delay}>` +
                 `<span class="pos-label">${pos[i]}</span>` +
                 `<button class="lock-toggle" onclick="toggleLock(${n}, ${i})" title="라인 고정 해제">🔒</button>` +
                 `<b class="player-name" ondblclick="toggleLock(${n}, ${i})" title="더블클릭으로 라인 고정">${name}</b>` +
                 `</div>`;
        }
        result.innerHTML = h;
    }

    function toggleLock(n, i) {
        locked[n][i] = !locked[n][i];
        renderTeam(n);
    }

    // "명단 완료" 버튼: 입력 순서대로 초기 셋팅, 모든 고정 해제, 카운터 리셋
    function confirmRoster() {
        const parsed = {};
        for (let n = 1; n <= 2; n++) {
            const raw = document.getElementById(`t${n}Input`).value.trim();
            const names = raw.split(/\s+/).filter(s=>s!=="");
            if (names.length !== 5) { alert(`${n}팀에 5명을 적어주세요.`); return; }
            parsed[n] = names;
        }
        for (let n = 1; n <= 2; n++) {
            currentLineup[n] = [...parsed[n]];
            locked[n] = [false,false,false,false,false];
            rerollCounts[n] = 0;
            updateCounter(n);
            renderTeam(n);
            document.getElementById(`t${n}Reroll`).disabled = false;
        }
        document.getElementById('rerollBothBtn').disabled = false;
    }

    function rerollBoth() {
        const t1Free = locked[1].filter(l => !l).length;
        const t2Free = locked[2].filter(l => !l).length;
        if (t1Free < 2 && t2Free < 2) {
            alert("두 팀 모두 자유로운 라인이 부족합니다.");
            return;
        }
        if (t1Free >= 2) rerollTeam(1);
        if (t2Free >= 2) rerollTeam(2);
    }

    function rerollTeam(n) {
        // 고정 안 된 포지션 인덱스와 이름 추출
        const freeIdx = [], freeNames = [];
        for (let i = 0; i < 5; i++) {
            if (!locked[n][i]) { freeIdx.push(i); freeNames.push(currentLineup[n][i]); }
        }
        if (freeIdx.length < 2) {
            alert(freeIdx.length === 0 ? "모든 라인이 고정되어 있습니다." : "자유로운 라인이 1개뿐이라 리롤 의미가 없습니다.");
            return;
        }

        rerollCounts[n]++;
        updateCounter(n);

        const rerollBtn = document.getElementById(`t${n}Reroll`);
        rerollBtn.disabled = true;

        const useAnim = document.getElementById('animToggle').checked;

        const applyShuffle = () => {
            const shuffled = shuffle(freeNames);
            freeIdx.forEach((idx, k) => { currentLineup[n][idx] = shuffled[k]; });
        };

        if (useAnim) {
            // 슬롯머신: 고정 안 된 자리만 빠르게 바뀜
            const spinId = setInterval(() => { applyShuffle(); renderTeam(n); }, 80);
            setTimeout(() => {
                clearInterval(spinId);
                setTimeout(() => { applyShuffle(); renderTeam(n); }, 200);
                setTimeout(() => {
                    applyShuffle();
                    renderTeam(n, freeIdx);  // 자유 자리만 깜빡임
                    rerollBtn.disabled = false;
                }, 500);
            }, 1500);
        } else {
            // 회전 없이 바로 최종 결과 + 깜빡임만
            applyShuffle();
            renderTeam(n, freeIdx);
            setTimeout(() => { rerollBtn.disabled = false; }, 700);
        }
    }

    function updateCounter(n) {
        document.getElementById(`t${n}Count`).innerText = `Reroll: ${rerollCounts[n]}`;
    }

    // 클립보드 복사 (file:// 환경 대비 폴백 포함)
    function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }
        return new Promise((resolve, reject) => {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                document.body.removeChild(ta);
                resolve();
            } catch (e) {
                document.body.removeChild(ta);
                reject(e);
            }
        });
    }

    function copyLineup(n) {
        if (currentLineup[n].length !== 5) {
            alert("명단을 먼저 완료해주세요.");
            return;
        }
        const text = currentLineup[n].join(' ');
        copyText(text).then(() => {
            const btn = document.getElementById(`copy${n}`);
            btn.innerText = '✅';
            setTimeout(() => { btn.innerText = '📋'; }, 1200);
        }).catch(err => {
            alert("복사 실패: " + err);
        });
    }
</script>

</body>
</html>
